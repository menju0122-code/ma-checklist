<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&A デューデリジェンス チェックリスト作成ツール</title>
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --accent: #2b6cb0;
            --accent-light: #4299e1;
            --bg: #f7fafc;
            --card: #ffffff;
            --text: #1a202c;
            --text-light: #718096;
            --border: #e2e8f0;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
            --shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }
        header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .3rem; }
        header p { font-size: .95rem; opacity: .85; }
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        /* Selection Panel */
        .selection-panel {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .selection-panel h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .industry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: .75rem;
            margin-bottom: 1.5rem;
        }
        .industry-btn {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .85rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            cursor: pointer;
            transition: all .2s;
            font-size: .9rem;
            color: var(--text);
        }
        .industry-btn:hover { border-color: var(--accent-light); background: #ebf8ff; }
        .industry-btn.active { border-color: var(--accent); background: #bee3f8; font-weight: 600; }
        .industry-btn .icon { font-size: 1.4rem; }

        .company-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .company-info label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: .3rem;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .company-info input, .company-info select {
            width: 100%;
            padding: .6rem .8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: .95rem;
            transition: border-color .2s;
        }
        .company-info input:focus, .company-info select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66,153,225,.15);
        }

        .generate-btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .8rem 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .2s;
            box-shadow: var(--shadow);
        }
        .generate-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
        .generate-btn:active { transform: translateY(0); }

        /* Checklist Output */
        #checklist-output { display: none; }
        #checklist-output.visible { display: block; }

        .checklist-header {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .checklist-header h2 { font-size: 1.3rem; color: var(--primary); }
        .checklist-meta { font-size: .85rem; color: var(--text-light); }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-top: .8rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #48bb78);
            border-radius: 4px;
            transition: width .4s ease;
            width: 0%;
        }
        .progress-text { font-size: .8rem; color: var(--text-light); margin-top: .3rem; }

        .action-buttons { display: flex; gap: .5rem; flex-wrap: wrap; }
        .action-btn {
            padding: .5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            cursor: pointer;
            font-size: .85rem;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: .3rem;
        }
        .action-btn:hover { background: #edf2f7; border-color: var(--accent-light); }
        .action-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .action-btn.primary:hover { background: var(--primary-light); }

        /* Category Sections */
        .category-section {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .category-header {
            padding: 1rem 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background .2s;
        }
        .category-header:hover { background: #f7fafc; }
        .category-title {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-weight: 600;
            font-size: 1.05rem;
        }
        .category-badge {
            font-size: .75rem;
            padding: .15rem .5rem;
            border-radius: 10px;
            font-weight: 500;
        }
        .badge-high { background: #fed7d7; color: var(--danger); }
        .badge-medium { background: #fefcbf; color: #975a16; }
        .badge-low { background: #c6f6d5; color: #276749; }
        .category-toggle {
            font-size: 1.2rem;
            transition: transform .3s;
            color: var(--text-light);
        }
        .category-toggle.open { transform: rotate(180deg); }

        .category-body { padding: 0 1.5rem 1rem; }
        .category-body.collapsed { display: none; }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: .8rem;
            padding: .7rem .8rem;
            border-bottom: 1px solid #f0f4f8;
            border-left: 3px solid transparent;
            border-radius: 4px;
            margin: 2px 0;
            transition: background .2s, border-color .2s;
        }
        .checklist-item:last-child { border-bottom: none; }
        .checklist-item.item-high {
            border-left-color: var(--danger);
            background: #fff5f5;
        }
        .checklist-item.item-medium {
            border-left-color: #d69e2e;
            background: #fffff0;
        }
        .checklist-item.item-low {
            border-left-color: #c6f6d5;
            background: transparent;
            opacity: .7;
        }
        .checklist-item.item-low .item-title { font-weight: 400; color: var(--text-light); }
        .checklist-item input[type="checkbox"] {
            width: 18px; height: 18px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }
        .item-content { flex: 1; }
        .item-title { font-size: .95rem; }
        .item-title.title-high { font-weight: 700; color: #c53030; }
        .item-title.title-medium { font-weight: 500; }
        .item-title.title-low { font-weight: 400; color: var(--text-light); }
        .item-title.checked { text-decoration: line-through; color: var(--text-light) !important; font-weight: 400 !important; }
        .item-detail {
            font-size: .8rem;
            color: var(--text-light);
            margin-top: .2rem;
        }
        .item-priority {
            font-size: .7rem;
            padding: .15rem .5rem;
            border-radius: 4px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 3px;
        }
        .priority-high { background: #fed7d7; color: var(--danger); }
        .priority-medium { background: #fefcbf; color: #975a16; }
        .priority-low { background: #c6f6d5; color: #276749; }

        /* Category relevance styling */
        .category-section.relevance-critical {
            border-left: 4px solid var(--danger);
        }
        .category-section.relevance-critical .category-header {
            background: linear-gradient(90deg, #fff5f5 0%, white 100%);
        }
        .category-section.relevance-important {
            border-left: 4px solid #d69e2e;
        }
        .category-section.relevance-important .category-header {
            background: linear-gradient(90deg, #fffff0 0%, white 100%);
        }
        .category-section.relevance-standard {
            border-left: 4px solid var(--border);
            opacity: .85;
        }

        /* Key Focus Panel */
        .key-focus-panel {
            background: linear-gradient(135deg, #fff5f5 0%, #fffaf0 50%, #f0fff4 100%);
            border: 2px solid #feb2b2;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .key-focus-panel h3 {
            font-size: 1.15rem;
            color: var(--danger);
            margin-bottom: .3rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .key-focus-panel .kf-subtitle {
            font-size: .85rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }
        .focus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: .8rem;
        }
        .focus-card {
            background: white;
            border-radius: 8px;
            padding: .8rem 1rem;
            border-left: 4px solid var(--danger);
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            display: flex;
            align-items: flex-start;
            gap: .6rem;
        }
        .focus-card .fc-icon { font-size: 1.3rem; flex-shrink: 0; }
        .focus-card .fc-title { font-weight: 700; font-size: .9rem; color: #c53030; }
        .focus-card .fc-desc { font-size: .78rem; color: var(--text-light); margin-top: .15rem; }

        /* Relevance Heatmap */
        .heatmap-panel {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .heatmap-panel h3 {
            font-size: 1.05rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: .6rem;
        }
        .heatmap-item {
            text-align: center;
            padding: .7rem .5rem;
            border-radius: 8px;
            font-size: .8rem;
            font-weight: 600;
            transition: transform .15s;
        }
        .heatmap-item:hover { transform: scale(1.03); }
        .heatmap-item .hm-icon { font-size: 1.4rem; display: block; margin-bottom: .3rem; }
        .hm-critical { background: #fed7d7; color: #c53030; border: 2px solid #fc8181; }
        .hm-important { background: #fefcbf; color: #975a16; border: 2px solid #f6e05e; }
        .hm-standard { background: #f7fafc; color: var(--text-light); border: 2px solid var(--border); }

        /* Priority Filter */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-bar span { font-size: .85rem; font-weight: 600; color: var(--text-light); }
        .filter-btn {
            padding: .35rem .8rem;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: .8rem;
            font-weight: 600;
            transition: all .2s;
        }
        .filter-btn:hover { border-color: var(--accent-light); }
        .filter-btn.active { border-color: var(--accent); background: #bee3f8; }
        .filter-btn.f-high { border-color: #fc8181; }
        .filter-btn.f-high.active { background: #fed7d7; border-color: #c53030; color: #c53030; }
        .filter-btn.f-medium { border-color: #f6e05e; }
        .filter-btn.f-medium.active { background: #fefcbf; border-color: #975a16; color: #975a16; }
        .filter-btn.f-low { border-color: #9ae6b4; }
        .filter-btn.f-low.active { background: #c6f6d5; border-color: #276749; color: #276749; }
        .checklist-item.filtered-out { display: none !important; }

        .note-input {
            width: 100%;
            margin-top: .3rem;
            padding: .3rem .5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: .8rem;
            display: none;
        }
        .note-input.visible { display: block; }

        /* Print Styles */
        @media print {
            header { padding: 1rem; }
            .selection-panel, .action-buttons, .generate-btn, .note-input, .filter-bar { display: none !important; }
            .category-body.collapsed { display: block !important; }
            .category-section { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
            .key-focus-panel { break-inside: avoid; box-shadow: none; border: 2px solid #ddd; }
            .heatmap-panel { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
            body { background: white; }
            .container { max-width: 100%; }
            .checklist-item.item-high { background: #fff5f5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .checklist-item.item-low { opacity: .6; }
        }
        @media (max-width: 600px) {
            .industry-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .company-info { grid-template-columns: 1fr; }
            .checklist-header { flex-direction: column; align-items: flex-start; }
        }

        .fade-in { animation: fadeIn .4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <h1>M&A デューデリジェンス チェックリスト</h1>
        <p>業種を選択して、カスタマイズされたDD チェックリストを自動生成</p>
    </header>

    <div class="container">
        <div class="selection-panel">
            <h2>&#128196; 業種を選択してください</h2>
            <div class="industry-grid" id="industry-grid"></div>

            <h2>&#128203; 基本情報（任意）</h2>
            <div class="company-info">
                <div>
                    <label>対象会社名</label>
                    <input type="text" id="company-name" placeholder="例：株式会社〇〇">
                </div>
                <div>
                    <label>案件名</label>
                    <input type="text" id="deal-name" placeholder="例：〇〇プロジェクト">
                </div>
                <div>
                    <label>想定スキーム</label>
                    <select id="deal-scheme">
                        <option value="">選択してください</option>
                        <option value="株式譲渡">株式譲渡</option>
                        <option value="事業譲渡">事業譲渡</option>
                        <option value="合併">合併</option>
                        <option value="会社分割">会社分割</option>
                        <option value="株式交換">株式交換</option>
                        <option value="第三者割当増資">第三者割当増資</option>
                    </select>
                </div>
                <div>
                    <label>作成日</label>
                    <input type="date" id="create-date">
                </div>
            </div>

            <button class="generate-btn" onclick="generateChecklist()">&#128221; チェックリストを生成</button>
        </div>

        <div id="checklist-output"></div>
    </div>

<script>

const industries = [

    { id: 'retail', name: '小売・流通', icon: '🛒' },

    { id: 'construction', name: '建設・不動産', icon: '🏗️' },
    { id: 'medical', name: '医療・介護', icon: '🏥' },
    { id: 'finance', name: '金融・保険', icon: '🏦' },
    { id: 'logistics', name: '物流・運輸', icon: '🚚' },
    { id: 'service', name: 'サービス業', icon: '🤝' },
    { id: 'agriculture', name: '農業・水産業', icon: '🌾' },
    { id: 'energy', name: 'エネルギー', icon: '⚡' },
    { id: 'education', name: '教育・人材', icon: '📚' },

    { id: 'hotel', name: '宿泊・観光', icon: '🏨' },
];

// ===== Common DD Categories =====

            { title: '株式に関する契約', detail: '株主間契約、新株予約権、ストックオプションの確認', priority: 'medium' },
        ]
    },
    {

    },
    {
        id: 'hr',

        priority: 'high',

let selectedIndustry = null;
let checkState = {};
let activeFilters = new Set(['high', 'medium', 'low']);

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('industry-grid');
    industries.forEach(ind => {
        const btn = document.createElement('button');
        btn.className = 'industry-btn';
        btn.setAttribute('data-id', ind.id);
        btn.innerHTML = `<span class="icon">${ind.icon}</span>${ind.name}`;
        btn.onclick = () => selectIndustry(ind.id);
        grid.appendChild(btn);
    });
    document.getElementById('create-date').value = new Date().toISOString().split('T')[0];
});

function selectIndustry(id) {
    selectedIndustry = id;
    document.querySelectorAll('.industry-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-id') === id);
    });
}

function generateChecklist() {
    if (!selectedIndustry) {
        alert('業種を選択してください。');
        return;
    }

    checkState = {};
    const output = document.getElementById('checklist-output');
    const indInfo = industries.find(i => i.id === selectedIndustry);
    const companyName = document.getElementById('company-name').value || '（未入力）';
    const dealName = document.getElementById('deal-name').value || '（未入力）';
    const dealScheme = document.getElementById('deal-scheme').value || '（未選択）';
    const createDate = document.getElementById('create-date').value;

    const relevance = industryRelevance[selectedIndustry] || {};
    activeFilters = new Set(['high', 'medium', 'low']);

    let html = `
    <div class="checklist-header fade-in">
        <div style="flex:1">
            <h2>${indInfo.icon} ${indInfo.name} M&A チェックリスト</h2>
            <div class="checklist-meta">
                対象: ${companyName} ｜ 案件: ${dealName} ｜ スキーム: ${dealScheme} ｜ 作成日: ${createDate}

            <button class="action-btn primary" onclick="window.print()">印刷</button>
        </div>
    </div>`;

    // Key Focus Points Panel
    if (relevance.keyFocusPoints) {
        html += `<div class="key-focus-panel fade-in">
            <h3>&#9888;&#65039; ${indInfo.name}のM&A 重要論点</h3>
            <div class="kf-subtitle">この業種で特に注意すべきリスク・論点を優先的に確認してください</div>
            <div class="focus-grid">`;
        relevance.keyFocusPoints.forEach(fp => {
            html += `<div class="focus-card">
                <span class="fc-icon">${fp.icon}</span>
                <div>
                    <div class="fc-title">${fp.title}</div>
                    <div class="fc-desc">${fp.desc}</div>
                </div>
            </div>`;
        });
        html += `</div></div>`;

    html += `<div class="heatmap-panel fade-in">
        <h3>DD分野別 重要度マップ（${indInfo.name}）</h3>
        <div class="heatmap-grid">`;
    commonCategories.forEach(cat => {
        const rel = relevance[cat.id] || 'standard';
        const hmClass = rel === 'critical' ? 'hm-critical' : rel === 'important' ? 'hm-important' : 'hm-standard';
        const relLabel = rel === 'critical' ? '最重要' : rel === 'important' ? '重要' : '標準';
        html += `<div class="heatmap-item ${hmClass}">
            <span class="hm-icon">${cat.icon}</span>
            ${cat.name}<br><small>${relLabel}</small>
        </div>`;
    });
    const specific = industrySpecific[selectedIndustry];
    if (specific) {
        specific.categories.forEach(cat => {
            html += `<div class="heatmap-item hm-critical">
                <span class="hm-icon">${cat.icon}</span>
                ${cat.name}<br><small>業種固有</small>
            </div>`;
        });

    html += `</div></div>`;

    html += `<div class="filter-bar fade-in">
        <span>表示フィルター：</span>
        <button class="filter-btn f-high active" onclick="toggleFilter('high', this)">&#9632; 重要度：高</button>
        <button class="filter-btn f-medium active" onclick="toggleFilter('medium', this)">&#9632; 重要度：中</button>
        <button class="filter-btn f-low active" onclick="toggleFilter('low', this)">&#9632; 重要度：低</button>
    </div>`;

    // Render common categories
    let itemIndex = 0;
    commonCategories.forEach((cat, catIdx) => {
        const rel = relevance[cat.id] || 'standard';
        html += renderCategory(cat, catIdx, itemIndex, 'common', rel);
        itemIndex += cat.items.length;
    });

    // Render industry-specific
    if (specific) {
        html += `<div class="fade-in" style="margin-top:1.5rem">
            <h3 style="color:var(--primary);margin-bottom:.8rem;font-size:1.1rem">${specific.icon} ${specific.name}</h3>
        </div>`;
        specific.categories.forEach((cat, catIdx) => {
            html += renderCategory(cat, catIdx, itemIndex, 'specific', 'critical');
            itemIndex += cat.items.length;
        });
    }

    output.innerHTML = html;
    output.className = 'visible';
    updateProgress();
    output.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderCategory(cat, catIdx, startIdx, prefix, relevanceLevel) {
    const priorityClass = cat.priority === 'high' ? 'badge-high' : cat.priority === 'medium' ? 'badge-medium' : 'badge-low';
    const priorityLabel = cat.priority === 'high' ? '重要度：高' : cat.priority === 'medium' ? '重要度：中' : '重要度：低';
    const relClass = relevanceLevel === 'critical' ? 'relevance-critical' : relevanceLevel === 'important' ? 'relevance-important' : 'relevance-standard';
    const relBadge = relevanceLevel === 'critical' ? '<span class="category-badge badge-high" style="font-size:.7rem">&#9733; 最重要</span>' :
                     relevanceLevel === 'important' ? '<span class="category-badge badge-medium" style="font-size:.7rem">&#9733; 重要</span>' : '';

    let html = `<div class="category-section ${relClass} fade-in">
        <div class="category-header" onclick="toggleCategory('${prefix}-${catIdx}')">
            <div class="category-title">
                <span>${cat.icon}</span>
                <span>${cat.name}</span>
                ${relBadge}
                <span class="category-badge ${priorityClass}">${priorityLabel}</span>
                <span style="font-size:.85rem;color:var(--text-light)">(${cat.items.length}項目)</span>
            </div>
            <span class="category-toggle open" id="toggle-${prefix}-${catIdx}">▼</span>
        </div>
        <div class="category-body" id="body-${prefix}-${catIdx}">`;

    cat.items.forEach((item, idx) => {
        const globalIdx = startIdx + idx;
        const pClass = item.priority === 'high' ? 'priority-high' : item.priority === 'medium' ? 'priority-medium' : 'priority-low';
        const pLabel = item.priority === 'high' ? '高' : item.priority === 'medium' ? '中' : '低';
        const itemRowClass = `item-${item.priority}`;
        const titleClass = `title-${item.priority}`;
        html += `<div class="checklist-item ${itemRowClass}" data-priority="${item.priority}">
            <input type="checkbox" id="check-${globalIdx}" onchange="onCheck(${globalIdx})">
            <div class="item-content">
                <div class="item-title ${titleClass}" id="title-${globalIdx}">${item.title}</div>
                <div class="item-detail">${item.detail}</div>
                <input class="note-input" id="note-${globalIdx}" placeholder="メモを入力..." onfocus="this.classList.add('visible')" onblur="if(!this.value)this.classList.remove('visible')">
            </div>
            <span class="item-priority ${pClass}">${pLabel}</span>
        </div>`;
    });

    html += `</div></div>`;
    return html;
}

function toggleFilter(priority, btn) {
    if (activeFilters.has(priority)) {
        activeFilters.delete(priority);
        btn.classList.remove('active');
    } else {
        activeFilters.add(priority);
        btn.classList.add('active');
    }
    applyFilters();
}

function applyFilters() {
    document.querySelectorAll('.checklist-item[data-priority]').forEach(item => {
        const p = item.getAttribute('data-priority');
        item.classList.toggle('filtered-out', !activeFilters.has(p));
    });
    updateProgress();
}

function toggleCategory(id) {
    const body = document.getElementById('body-' + id);
    const toggle = document.getElementById('toggle-' + id);
    body.classList.toggle('collapsed');
    toggle.classList.toggle('open');
}

function expandAll() {
    document.querySelectorAll('.category-body').forEach(el => el.classList.remove('collapsed'));
    document.querySelectorAll('.category-toggle').forEach(el => el.classList.add('open'));
}
function collapseAll() {
    document.querySelectorAll('.category-body').forEach(el => el.classList.add('collapsed'));
    document.querySelectorAll('.category-toggle').forEach(el => el.classList.remove('open'));
}

function onCheck(idx) {
    const cb = document.getElementById('check-' + idx);
    const title = document.getElementById('title-' + idx);
    checkState[idx] = cb.checked;
    title.classList.toggle('checked', cb.checked);
    updateProgress();
}

function checkAll() {
    document.querySelectorAll('#checklist-output input[type="checkbox"]').forEach(cb => {
        cb.checked = true;
        const idx = cb.id.replace('check-', '');
        checkState[idx] = true;
        const title = document.getElementById('title-' + idx);
        if (title) title.classList.add('checked');
    });
    updateProgress();
}
function uncheckAll() {
    document.querySelectorAll('#checklist-output input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
        const idx = cb.id.replace('check-', '');
        checkState[idx] = false;
        const title = document.getElementById('title-' + idx);
        if (title) title.classList.remove('checked');
    });
    updateProgress();
}

function updateProgress() {
    const all = document.querySelectorAll('#checklist-output input[type="checkbox"]');
    const checked = document.querySelectorAll('#checklist-output input[type="checkbox"]:checked');
    const total = all.length;
    const done = checked.length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const fill = document.getElementById('progress-fill');
    const text = document.getElementById('progress-text');
    if (fill) fill.style.width = pct + '%';
    if (text) text.textContent = `進捗: ${done} / ${total} 項目完了（${pct}%）`;
}

function exportCSV() {
    const indInfo = industries.find(i => i.id === selectedIndustry);
    const companyName = document.getElementById('company-name').value || '';
    const BOM = '\uFEFF';
    let csv = BOM + 'カテゴリ,項目,詳細,重要度,チェック,メモ\n';

    let globalIdx = 0;
    const allCats = [...commonCategories];
    const specific = industrySpecific[selectedIndustry];
    if (specific) allCats.push(...specific.categories);

    allCats.forEach(cat => {
        cat.items.forEach(item => {
            const checked = checkState[globalIdx] ? '済' : '未';
            const noteEl = document.getElementById('note-' + globalIdx);
            const note = noteEl ? noteEl.value.replace(/"/g, '""') : '';
            const pLabel = item.priority === 'high' ? '高' : item.priority === 'medium' ? '中' : '低';
            csv += `"${cat.name}","${item.title}","${item.detail}","${pLabel}","${checked}","${note}"\n`;
            globalIdx++;
        });
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `MA_Checklist_${indInfo.name}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
