<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&A デューデリジェンス チェックリスト作成ツール</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>M&A デューデリジェンス チェックリスト</h1>
        <p>業種を選択して、カスタマイズされたDD チェックリストを自動生成</p>
    </header>

    <div class="container">
        <div class="selection-panel">
            <h2>&#128196; 業種を選択してください</h2>
            <div class="industry-grid" id="industry-grid"></div>

            <h2>&#128203; 基本情報（任意）</h2>
            <div class="company-info">
                <div>
                    <label>対象会社名</label>
                    <input type="text" id="company-name" placeholder="例：株式会社〇〇">
                </div>
                <div>
                    <label>案件名</label>
                    <input type="text" id="deal-name" placeholder="例：〇〇プロジェクト">
                </div>
                <div>
                    <label>想定スキーム</label>
                    <select id="deal-scheme">
                        <option value="">選択してください</option>
                        <option value="株式譲渡">株式譲渡</option>
                        <option value="事業譲渡">事業譲渡</option>
                        <option value="合併">合併</option>
                        <option value="会社分割">会社分割</option>
                        <option value="株式交換">株式交換</option>
                        <option value="第三者割当増資">第三者割当増資</option>
                    </select>
                </div>
                <div>
                    <label>作成日</label>
                    <input type="date" id="create-date">
                </div>
            </div>

            <button class="generate-btn" onclick="generateChecklist()">&#128221; チェックリストを生成</button>
        </div>

        <div id="checklist-output"></div>
    </div>

<script src="js/industry-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
