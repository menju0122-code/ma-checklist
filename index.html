<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&A デューデリジェンス チェックリスト作成ツール</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>M&A デューデリジェンス チェックリスト</h1>
        <p>業種を選択して、カスタマイズされたDD チェックリストを自動生成</p>
    </header>

    <div class="container">

        <!-- ===== チェックリスト設定パネル ===== -->
        <div class="selection-panel">
            <h2>&#128196; 業種を選択してください</h2>
            <div class="industry-grid" id="industry-grid"></div>

            <h2>&#128203; 基本情報（任意）</h2>
            <div class="company-info">
                <div>
                    <label>対象会社名</label>
                    <input type="text" id="company-name" placeholder="例：株式会社〇〇">
                </div>
                <div>
                    <label>案件名</label>
                    <input type="text" id="deal-name" placeholder="例：〇〇プロジェクト">
                </div>
                <div>
                    <label>想定スキーム</label>
                    <select id="deal-scheme">
                        <option value="">選択してください</option>
                        <option value="株式譲渡">株式譲渡</option>
                        <option value="事業譲渡">事業譲渡</option>
                        <option value="合併">合併</option>
                        <option value="会社分割">会社分割</option>
                        <option value="株式交換">株式交換</option>
                        <option value="第三者割当増資">第三者割当増資</option>
                    </select>
                </div>
                <div>
                    <label>作成日</label>
                    <input type="date" id="create-date">
                </div>
            </div>

            <button class="generate-btn" onclick="generateChecklist()">&#128221; チェックリストを生成</button>
        </div>

        <!-- ===== AI分析パネル ===== -->
        <div class="selection-panel analyzer-section">
            <h2>🤖 企業概況書 AI分析</h2>
            <p class="analyzer-desc">企業概況書（IM・PDF）をアップロードすると、Claude AIが買い手視点のメリット・デメリットと初回QAを自動生成します。</p>

            <!-- ファイルアップロード -->
            <div id="pdf-drop-zone" class="pdf-drop-zone" onclick="document.getElementById('pdf-upload').click()">
                <div id="pdf-icon" class="pdf-drop-icon">📄</div>
                <div class="pdf-drop-text">クリックまたはドラッグ＆ドロップで PDFをアップロード</div>
                <div id="pdf-filename" class="pdf-filename"></div>
                <input type="file" id="pdf-upload" accept=".pdf" style="display:none">
            </div>
            <div id="pdf-status" class="pdf-status"></div>

            <!-- APIキー入力 -->
            <div class="api-key-row">
                <label>Claude API Key</label>
                <div class="api-key-input-wrap">
                    <input type="password" id="api-key" placeholder="sk-ant-api03-..." autocomplete="off">
                    <button id="toggle-key-btn" class="toggle-key-btn" onclick="toggleApiKey()">👁</button>
                </div>
                <div class="api-key-note">※ APIキーはブラウザ内のみで使用されます（Claude APIへの通信を除く）</div>
            </div>

            <!-- 分析ボタン -->
            <button id="analyze-btn" class="analyze-btn" onclick="analyzeCompanyDocument()" disabled>
                🤖 AI分析を実行
            </button>
        </div>

        <!-- ===== 分析結果パネル ===== -->
        <div id="analysis-result" class="analysis-result" style="display:none"></div>

        <!-- ===== チェックリスト出力 ===== -->
        <div id="checklist-output"></div>

    </div>

    <!-- ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- アプリ -->
    <script src="js/industry-data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/excel-export.js"></script>
    <script src="js/analyzer.js"></script>
</body>
</html>
